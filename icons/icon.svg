<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e1e"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)" stroke="#555" stroke-width="2"/>
  <!-- Console bracket > -->
  <text x="18" y="78" font-family="Menlo, Consolas, monospace" font-size="56" font-weight="bold" fill="#007acc">&gt;</text>
  <!-- Magnifying glass -->
  <circle cx="82" cy="52" r="22" fill="none" stroke="#9cdcfe" stroke-width="5"/>
  <line x1="98" y1="68" x2="112" y2="82" stroke="#9cdcfe" stroke-width="5" stroke-linecap="round"/>
  <!-- Dot path dots -->
  <circle cx="72" cy="98" r="5" fill="#dcdcaa"/>
  <circle cx="88" cy="98" r="5" fill="#dcdcaa"/>
  <circle cx="104" cy="98" r="5" fill="#dcdcaa"/>
</svg>
